---
name: Docker push Api

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Repo
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.api
          push: true
          tags: io.pankaj/api-backend:${{ github.sha}}

      - name: Verify Pushed Image
        run: |
          docker pull io.pankaj/api-backend:${{ github.sha }}

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          scripts: |
            sudo docker pull io.pankaj/api-backend:${{ github.sha }}
            sudo docker stop api-backend || true
            sudo docker rm api-backend || true
            sudo docker run -d \
              --name api-backend \
              -p 8080:8080 \
              io.pankaj/api-backend:${{ github.sha }}
